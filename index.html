<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Kelime Kartı App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Lucide CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-right: 5px;
    }
  </style>
</head>

<body>

<header>
  <h2>📘 Kelime Kartı</h2>
  <i data-lucide="book-open"></i>
</header>

<div class="container">

  <div class="card">
    <input id="word" placeholder="Kelime" />
    <input id="meaning" placeholder="Anlam" />
    <button onclick="addWord()">Ekle</button>
  </div>

  <div id="list"></div>

</div>

<script>
  let words = JSON.parse(localStorage.getItem("words")) || [];

  function save() {
    localStorage.setItem("words", JSON.stringify(words));
  }

  function addWord() {
    const word = document.getElementById("word").value;
    const meaning = document.getElementById("meaning").value;

    if (!word || !meaning) return alert("Boş bırakılamaz");

    words.push({ word, meaning });
    save();
    render();
  }

  function deleteWord(index) {
    words.splice(index, 1);
    save();
    render();
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    words.forEach((item, i) => {
      list.innerHTML += `
        <div class="card">
          <h3>${item.word}</h3>
          <p>${item.meaning}</p>
          <button onclick="deleteWord(${i})">
            <i data-lucide="trash-2"></i> Sil
          </button>
        </div>
      `;
    });

    lucide.createIcons();
  }

  render();
</script>

</body>
</html>
