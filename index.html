    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `
                    <div style="padding: 24px; color: #ef4444; background: #fef2f2; border: 2px solid #fee2e2; border-radius: 24px; margin: 20px; font-family: 'Inter', sans-serif; max-width: 500px; mx-auto;">
                        <h1 style="font-size: 20px; font-weight: 900; margin-bottom: 12px; letter-spacing: -0.025em;">Uygulama Başlatılamadı</h1>
                        <p style="font-size: 14px; font-weight: 600; margin-bottom: 8px;">Hata: ${message}</p>
                        <p style="font-size: 12px; color: #991b1b; opacity: 0.7;">Konum: ${source}:${lineno}:${colno}</p>
                        ${error ? `<pre style="font-size: 11px; margin-top: 16px; overflow: auto; background: #ffffff; padding: 16px; border-radius: 16px; border: 1px solid #fee2e2; color: #450a0a;">${error.stack}</pre>` : ''}
                        <button onclick="location.reload()" style="margin-top: 20px; width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer;">Tekrar Dene</button>
                    </div>
                `;
            }
            return false;
        };
    </script>

        // Google GenAI Global fallback or Fetch-based implementation
        let GoogleGenAI = window.googleGenAI ? window.googleGenAI.GoogleGenAI : null;
        let Type = window.googleGenAI ? window.googleGenAI.Type : { OBJECT: "OBJECT", STRING: "STRING", ARRAY: "ARRAY" };

        if (!GoogleGenAI) {
            console.warn("Google GenAI SDK not found, using fetch fallback.");
            GoogleGenAI = class {
                constructor({ apiKey }) { this.apiKey = apiKey; }
                get models() {
                    return {
                        generateContent: async (params) => {
                            const model = params.model || "gemini-3-flash-preview";
                            const isTTS = model.includes("tts");
                            const baseUrl = "https://generativelanguage.googleapis.com/v1beta/models";
                            const url = `${baseUrl}/${model}:generateContent?key=${this.apiKey}`;
                            
                            const body = {
                                contents: Array.isArray(params.contents) ? params.contents : 
                                         (typeof params.contents === 'string' ? [{ parts: [{ text: params.contents }] }] : [params.contents]),
                                generationConfig: params.config || {}
                            };

                            // Add tools if present
                            if (params.tools) body.tools = params.tools;

                            const response = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(body)
                            });
                            
                            const data = await response.json();
                            if (data.error) throw new Error(data.error.message);

                            return {
                                text: data.candidates?.[0]?.content?.parts?.[0]?.text || "",
                                candidates: data.candidates,
                                // Helper for TTS modality
                                get audio() {
                                    return data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                                }
                            };
                        }
                    };
                }
            };
        }

        // --- UTILS ---
        const cn = (...classes) => classes.filter(Boolean).join(' ');

        const highlightWord = (sentence, wordsToHighlight, color) => {
            if (!sentence || !wordsToHighlight) return sentence;
            
            // Convert to array if it's a single string
            const words = Array.isArray(wordsToHighlight) ? wordsToHighlight : [wordsToHighlight];
            
            // Escape words for regex and join with |
            const escapedWords = words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
            const regex = new RegExp(`(${escapedWords})`, 'gi');
            
            const parts = sentence.split(regex);
            return parts.map((part, i) => 
                regex.test(part) ? 
                React.createElement('span', { key: i, style: { color: color, fontWeight: '900' } }, part) : 
                part
            );
        };

                        const newlyEnrichedWords = [];
                        
                        // Enrich new words (Mocking the AI call for speed if API key is missing, or calling AI if present)

                            if (settings.geminiApiKey) {

                    model: "gemini-2.5-flash-preview-tts",
                    contents: [{ parts: [{ text: `Say: ${text}` }] }],
                    config: {
                        responseModalities: ['AUDIO'],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: { voiceName: 'Kore' },
                            },
                        },
                    },
                });
                const base64Audio = response.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (base64Audio) {
                    return `data:audio/wav;base64,${base64Audio}`;
                }

                        <h2 className="display-6 font-black mb-2">{t('allDone')}</h2>

        const DifficultWords = () => {
            const { progress, settings, toggleDifficult, customWords, generateDifficultSession } = useStore();
            const t = useTranslation(settings.nativeLanguage);
            const navigate = useNavigate();
            const [searchQuery, setSearchQuery] = useState('');

            const difficultWords = customWords.filter(w => progress[w.id]?.isDifficult);
            const filteredWords = searchQuery.trim() ? customWords.filter(w => 
                w.translations[settings.learningLanguage].toLowerCase().includes(searchQuery.toLowerCase()) ||
                w.translations[settings.nativeLanguage].toLowerCase().includes(searchQuery.toLowerCase())
            ).slice(0, 5) : [];

            return (
                <div className="container max-w-md py-4 px-4">
                    <header className="py-5">
                        <h1 className="h2 font-black tracking-tight d-flex align-items-center gap-3">
                            <AlertTriangle size={32} className="text-warning" />
                            {t('difficultWords')}
                        </h1>
                    </header>

                    <div className="mb-5">
                        <div className="position-relative">
                            <Search className="position-absolute start-0 top-50 translate-middle-y ms-3 text-secondary" size={20} />
                            <input
                                type="text"
                                placeholder={t('searchWords')}
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="form-control form-control-lg rounded-4xl border-0 bg-body-tertiary py-3 ps-5 shadow-custom-sm focus:ring-2 focus:ring-primary outline-none transition-all"
                            />
                        </div>

                        {searchQuery && (
                            <div className="mt-3 d-grid gap-2">
                                {filteredWords.map(word => (
                                    <div key={word.id} className="bg-body p-3 rounded-4xl border d-flex align-items-center justify-content-between" style={{ borderColor: `${word.color}20` }}>
                                        <div>
                                            <p className="font-black text-uppercase tracking-tight mb-0" style={{ color: word.color }}>{word.translations[settings.learningLanguage]}</p>
                                            <p className="small font-bold mb-0" style={{ color: word.color, opacity: 0.6 }}>{word.translations[settings.nativeLanguage]}</p>
                                        </div>
                                        <button 
                                            onClick={() => toggleDifficult(word.id)} 
                                            className="btn btn-link p-2 rounded-3xl text-decoration-none"
                                            style={{ backgroundColor: `${word.color}10`, color: word.color }}
                                        >
                                            {progress[word.id]?.isDifficult ? <X size={20} /> : <Plus size={20} />}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="mb-5">
                        <h3 className="small font-black text-secondary text-uppercase tracking-widest mb-3">{t('difficultWords')} ({difficultWords.length})</h3>
                        {difficultWords.length > 0 ? (
                            <div className="d-grid gap-3">
                                <button 
                                    onClick={() => { generateDifficultSession(); navigate('/session'); }}
                                    className="btn btn-warning text-white py-3 rounded-4xl font-black d-flex align-items-center justify-content-center gap-2 shadow-custom-lg"
                                >
                                    <Play size={20} fill="currentColor" />
                                    {t('startReview')}
                                </button>

                                <div className="d-grid gap-3">
                                    {difficultWords.map(word => (
                                        <div key={word.id} className="bg-body p-5 rounded-5xl border d-flex align-items-center justify-content-between shadow-custom-sm" style={{ borderColor: `${word.color}20` }}>
                                            <div>
                                                <h3 className="h5 font-black text-uppercase tracking-tight mb-0" style={{ color: word.color }}>{word.translations[settings.learningLanguage]}</h3>
                                                <p className="font-bold mb-0" style={{ color: word.color, opacity: 0.6 }}>{word.translations[settings.nativeLanguage]}</p>
                                            </div>
                                            <button 
                                                onClick={() => toggleDifficult(word.id)} 
                                                className="btn btn-link p-3 text-decoration-none"
                                                style={{ color: word.color }}
                                            >
                                                <X size={20} />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-5 bg-body-tertiary rounded-5xl border border-dashed">
                                <p className="text-secondary font-medium mb-0">{t('noDifficultWords')}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Test = () => {
            const { settings, progress, customWords, toggleDifficult } = useStore();
            const t = useTranslation(settings.nativeLanguage);
            const navigate = useNavigate();

            const learnedWords = customWords.filter(w => progress[w.id]?.isLearned);
            const isTestUnlocked = learnedWords.length >= 10;
            const maxRounds = Math.min(learnedWords.length, settings.testSize || 10);

            const [gamePhase, setGamePhase] = useState(isTestUnlocked ? 'playing' : 'locked');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [wrongCount, setWrongCount] = useState(0);
            const [testWords, setTestWords] = useState([]);
            const [options, setOptions] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [feedback, setFeedback] = useState(null);
            const [currentTense, setCurrentTense] = useState('present');
            const [showHint, setShowHint] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);

            const playAudio = () => {
                if (audioUrl) {
                    const audio = new Audio(audioUrl);
                    audio.play();
                }
            };

            useEffect(() => {
                if (isTestUnlocked && gamePhase === 'playing' && testWords.length === 0) {
                    const shuffled = [...learnedWords].sort(() => 0.5 - Math.random());
                    setTestWords(shuffled.slice(0, maxRounds));
                }
            }, [isTestUnlocked, gamePhase, learnedWords, maxRounds]);

            useEffect(() => {
                if (testWords.length > 0 && currentIndex < testWords.length) {
                    const currentWord = testWords[currentIndex];
                    const tenses = ['present', 'past', 'future'];
                    const randomTense = tenses[Math.floor(Math.random() * tenses.length)];
                    setCurrentTense(randomTense);
                    setShowHint(false);
                    setAudioUrl(null);

                    // Generate audio
                    generateAudio(currentWord.translations[settings.learningLanguage], settings.learningLanguage, settings.geminiApiKey)
                        .then(url => setAudioUrl(url));

                    const correctAnswer = currentWord.translations[settings.learningLanguage];
                    const otherWords = customWords.filter(w => w.id !== currentWord.id);
                    const randomOthers = otherWords
                        .sort(() => 0.5 - Math.random())
                        .slice(0, 3)
                        .map(w => w.translations[settings.learningLanguage]);
                    
                    while (randomOthers.length < 3) {
                        randomOthers.push(`Option ${randomOthers.length + 1}`);
                    }

                    setOptions([...randomOthers, correctAnswer].sort(() => 0.5 - Math.random()));
                    setSelectedOption(null);
                    setFeedback(null);
                }
            }, [currentIndex, testWords, settings]);

            const handleCheck = () => {
                if (!selectedOption) return;
                const currentWord = testWords[currentIndex];
                const isCorrect = selectedOption === currentWord.translations[settings.learningLanguage];

                if (isCorrect) {
                    setScore(score + 1);
                    setFeedback('correct');
                } else {
                    setWrongCount(wrongCount + 1);
                    setFeedback('wrong');
                    toggleDifficult(currentWord.id);
                }

                setTimeout(() => {
                    if (currentIndex < testWords.length - 1) {
                        setCurrentIndex(currentIndex + 1);
                    } else {
                        setGamePhase('finished');
                    }
                }, 2000);
            };

            if (gamePhase === 'locked') {
                return (
                    <div className="container max-w-md py-5 px-4 text-center">
                        <div className="bg-body-tertiary p-5 rounded-5xl border border-dashed mb-4">
                            <div className="bg-warning bg-opacity-10 p-4 rounded-circle text-warning d-inline-block mb-4">
                                <AlertTriangle size={40} />
                            </div>
                            <h2 className="h3 font-black mb-2">{t('testLockMessage')}</h2>
                            <button onClick={() => navigate('/')} className="btn btn-primary px-5 py-3 rounded-4xl font-black shadow-custom-lg mt-4">
                                {t('backToHome')}
                            </button>
                        </div>
                    </div>
                );
            }

            if (gamePhase === 'finished') {
                return (
                    <div className="container max-w-md py-5 px-4 text-center">
                        <motion.div 
                            initial={{ scale: 0.9, opacity: 0 }}
                            animate={{ scale: 1, opacity: 1 }}
                            className="bg-body p-5 rounded-5xl border shadow-custom-xl"
                        >
                            <div className="bg-success bg-opacity-10 p-4 rounded-circle text-success d-inline-block mb-4">
                                <Trophy size={48} />
                            </div>
                            <h2 className="display-6 font-black mb-4">{t('testComplete')}</h2>
                            
                            <div className="row g-3 mb-5">
                                <div className="col-4">
                                    <div className="bg-body-tertiary p-3 rounded-4xl">
                                        <p className="small font-black text-secondary text-uppercase tracking-widest mb-1">{t('score')}</p>
                                        <p className="h3 font-black text-primary mb-0">{score}</p>
                                    </div>
                                </div>
                                <div className="col-4">
                                    <div className="bg-body-tertiary p-3 rounded-4xl">
                                        <p className="small font-black text-secondary text-uppercase tracking-widest mb-1">Hata</p>
                                        <p className="h3 font-black text-danger mb-0">{wrongCount}</p>
                                    </div>
                                </div>
                                <div className="col-4">
                                    <div className="bg-body-tertiary p-3 rounded-4xl">
                                        <p className="small font-black text-secondary text-uppercase tracking-widest mb-1">Başarı</p>
                                        <p className="h3 font-black text-success mb-0">%{Math.round((score/maxRounds)*100)}</p>
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => navigate('/')} className="btn btn-primary w-100 py-4 rounded-4xl font-black text-lg shadow-custom-lg">
                                {t('backToHome')}
                            </button>
                        </motion.div>
                    </div>
                );
            }

            const currentWord = testWords[currentIndex];
            if (!currentWord) return <div className="container py-5 text-center"><div className="spinner-border text-primary" role="status"></div></div>;

            const sentenceData = currentWord.sentences?.[currentTense] || { blank: "_____", translated: "No hint available" };

            return (
                <div className="container max-w-md py-4 px-4 d-flex flex-column h-100">
                    <div className="d-flex justify-content-between align-items-center bg-body p-3 rounded-4xl border shadow-custom-sm mb-4">
                        <span className="small font-black text-secondary text-uppercase tracking-widest">{currentIndex + 1} / {maxRounds}</span>
                        <div className="d-flex gap-3">
                            <span className="text-success font-black">✓ {score}</span>
                            <span className="text-danger font-black">✗ {wrongCount}</span>
                        </div>
                    </div>

                    <div className="bg-body p-5 rounded-5xl border border-4 text-center shadow-custom-xl position-relative overflow-hidden mb-4" style={{ borderColor: currentWord.color }}>
                        <div className="position-absolute top-0 start-0 p-3 d-flex gap-2">
                            <span className="badge rounded-pill font-black text-uppercase" style={{ backgroundColor: `${currentWord.color}20`, color: currentWord.color, fontSize: '10px' }}>
                                {t(currentTense)}
                            </span>
                            {audioUrl && (
                                <button onClick={playAudio} className="btn btn-link p-0 text-decoration-none" style={{ color: currentWord.color }}>
                                    <Volume2 size={16} />
                                </button>
                            )}
                        </div>
                        
                        <div className="py-4">
                            <h2 className="h3 font-black lh-base tracking-tight mb-0" style={{ color: currentWord.color }}>
                                {sentenceData.blank || "_____"}
                            </h2>
                        </div>

                        <div className="mt-3">
                            {showHint ? (
                                <p className="small fst-italic font-medium mb-0" style={{ color: currentWord.color, opacity: 0.7 }}>
                                    {sentenceData.translated}
                                </p>
                            ) : (
                                <button onClick={() => setShowHint(true)} className="btn btn-link p-0 text-decoration-none small font-black text-uppercase tracking-widest d-flex align-items-center justify-content-center gap-1 mx-auto" style={{ color: currentWord.color }}>
                                    <Info size={14} /> {t('riddleHint')}
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="row g-3 mb-4">
                        {options.map((option, i) => (
                            <div key={i} className="col-6">
                                <button 
                                    onClick={() => !feedback && setSelectedOption(option)}
                                    className={cn(
                                        "btn w-100 py-4 rounded-4xl font-bold text-sm border-2 transition-all shadow-custom-sm",
                                        selectedOption === option ? "btn-primary border-primary" : "btn-body border-light"
                                    )}
                                >
                                    {option}
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="mt-auto" style={{ height: '80px' }}>
                        {feedback ? (
                            <motion.div 
                                initial={{ scale: 0.9, opacity: 0 }}
                                animate={{ scale: 1, opacity: 1 }}
                                className={cn("w-100 py-4 rounded-4xl text-white font-black d-flex align-items-center justify-content-center gap-2", feedback === 'correct' ? "bg-success" : "bg-danger")}
                            >
                                {feedback === 'correct' ? <CheckCircle /> : <AlertTriangle />}
                                {feedback === 'correct' ? t('correctGuess') : t('wrongGuess')}
                            </motion.div>
                        ) : (
                            <button 
                                onClick={handleCheck}
                                disabled={!selectedOption}
                                className="btn btn-dark w-100 py-4 rounded-4xl font-black text-lg shadow-custom-xl disabled:opacity-50"
                            >
                                {t('checkAnswer')}
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const Settings = () => {
            const { settings, updateSettings, resetProgress } = useStore();
            const t = useTranslation(settings.nativeLanguage);
            const [localSettings, setLocalSettings] = useState(settings);
            const [isSaved, setIsSaved] = useState(false);
            const [showConfirm, setShowConfirm] = useState(false);

            const handleSave = () => {
                updateSettings(localSettings);
                setIsSaved(true);
                setTimeout(() => setIsSaved(false), 2000);
            };

            const handleExport = () => {
                const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'polyglot_learner_export.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="container max-w-md py-4 px-4">
                    <header className="py-5">
                        <h1 className="h2 font-black tracking-tight mb-1">{t('settingsTitle')}</h1>
                        <p className="text-secondary font-medium">{t('settingsDesc')}</p>
                    </header>

                    <div className="d-grid gap-4 mb-5">
                        <div className="bg-body p-5 rounded-5xl border shadow-custom-sm">
                            <div className="mb-4">
                                <label className="small font-black text-uppercase tracking-widest text-secondary mb-2 d-block">{t('geminiApiKey')}</label>
                                <input 
                                    type="password" 
                                    value={localSettings.geminiApiKey}
                                    onChange={(e) => setLocalSettings({ ...localSettings, geminiApiKey: e.target.value })}
                                    className="form-control rounded-3xl border-0 bg-body-tertiary py-3 px-4 shadow-none"
                                    placeholder="AI features require an API key..."
                                />
                                <p className="text-secondary small mt-2" style={{ fontSize: '10px' }}>{t('geminiApiKeyDesc')}</p>
                            </div>

                            <div className="mb-4">
                                <label className="small font-black text-uppercase tracking-widest text-secondary mb-2 d-block">{t('dailyNewWords')}</label>
                                <input 
                                    type="range" min="3" max="50" step="1"
                                    value={localSettings.dailyNewWords}
                                    onChange={(e) => setLocalSettings({ ...localSettings, dailyNewWords: parseInt(e.target.value) })}
                                    className="form-range"
                                />
                                <div className="d-flex justify-content-between small font-bold text-secondary">
                                    <span>3</span>
                                    <span className="text-primary">{localSettings.dailyNewWords}</span>
                                    <span>50</span>
                                </div>
                            </div>

                            <div className="mb-0">
                                <label className="small font-black text-uppercase tracking-widest text-secondary mb-2 d-block">{t('targetRepetitions')}</label>
                                <input 
                                    type="range" min="3" max="15" step="1"
                                    value={localSettings.targetRepetitions}
                                    onChange={(e) => setLocalSettings({ ...localSettings, targetRepetitions: parseInt(e.target.value) })}
                                    className="form-range"
                                />
                                <div className="d-flex justify-content-between small font-bold text-secondary">
                                    <span>3</span>
                                    <span className="text-primary">{localSettings.targetRepetitions}</span>
                                    <span>15</span>
                                </div>
                            </div>
                        </div>

                        <button 
                            onClick={handleSave}
                            className={cn(
                                "btn w-100 py-4 rounded-4xl font-black text-lg shadow-custom-lg transition-all active:scale-95 d-flex align-items-center justify-content-center gap-2",
                                isSaved ? "btn-success" : "btn-primary"
                            )}
                        >
                            {isSaved ? <CheckCircle /> : <Save />}
                            {isSaved ? t('autoSaved') : t('saveSettings')}
                        </button>

                        {showConfirm ? (
                            <div className="d-flex gap-2 w-100 mt-2">
                                <button onClick={() => setShowConfirm(false)} className="btn btn-secondary flex-grow-1 py-3 rounded-4xl font-black">İptal</button>
                                <button onClick={() => { resetProgress(); setShowConfirm(false); }} className="btn btn-danger flex-grow-1 py-3 rounded-4xl font-black">Eminim, Sil</button>
                            </div>
                        ) : (
                            <button 
                                onClick={() => setShowConfirm(true)}
                                className="btn btn-link w-100 py-3 text-danger font-black text-decoration-none d-flex align-items-center justify-content-center gap-2 mt-2"
                            >
                                <Trash2 size={18} />
                                {t('resetProgress')}
                            </button>
                        )}

                        <button 
                            onClick={handleExport}
                            className="btn btn-outline-secondary w-100 py-3 rounded-4xl font-black text-decoration-none d-flex align-items-center justify-content-center gap-2 mt-2"
                        >
                            <Download size={18} />
                            Export Project
                        </button>
                    </div>
                </div>
            );
        };

        const Learned = () => {
            const { progress, customWords, settings, toggleDifficult } = useStore();
            const t = useTranslation(settings.nativeLanguage);
            const learnedWords = customWords.filter(w => progress[w.id]?.isLearned);

            return (
                <div className="container max-w-md py-4 px-4">
                    <header className="py-5">
                        <h1 className="h2 font-black tracking-tight mb-1">{t('learnedWordsTitle')}</h1>
                        <p className="text-secondary font-medium">{t('learnedWordsDesc', { count: learnedWords.length })}</p>
                    </header>

                    <div className="d-grid gap-3 mb-5">
                        {learnedWords.length > 0 ? (
                            learnedWords.map(word => (
                                <div key={word.id} className="bg-body p-4 rounded-5xl border d-flex align-items-center justify-content-between shadow-custom-sm" style={{ borderColor: `${word.color}20` }}>
                                    <div>
                                        <h3 className="h5 font-black text-uppercase tracking-tight mb-0" style={{ color: word.color }}>{word.translations[settings.learningLanguage]}</h3>
                                        <p className="font-bold mb-0" style={{ color: word.color, opacity: 0.6 }}>{word.translations[settings.nativeLanguage]}</p>
                                    </div>
                                    <button 
                                        onClick={() => toggleDifficult(word.id)} 
                                        className="btn btn-link p-2 rounded-3xl text-decoration-none transition-colors"
                                        style={{ color: word.color, opacity: progress[word.id]?.isDifficult ? 1 : 0.3 }}
                                    >
                                        <AlertTriangle size={20} />
                                    </button>
                                </div>
                            ))
                        ) : (
                            <div className="text-center py-5 bg-body-tertiary rounded-5xl border border-dashed">
                                <p className="text-secondary font-medium mb-0">{t('noWordsLearned')}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const { settings } = useStore();
            
            useEffect(() => {
                document.documentElement.setAttribute('data-bs-theme', settings.darkMode ? 'dark' : 'light');
            }, [settings.darkMode]);

            return (
                <HashRouter>
                    <Routes>
                        <Route path="/welcome" element={<Welcome />} />
                        <Route element={<Layout />}>
                            <Route path="/" element={<Home />} />
                            <Route path="/session" element={<Session />} />
                            <Route path="/difficult-words" element={<DifficultWords />} />
                            <Route path="/learned" element={<Learned />} />
                            <Route path="/settings" element={<Settings />} />
                            <Route path="/test" element={<Test />} />
                        </Route>
                    </Routes>
                </HashRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
